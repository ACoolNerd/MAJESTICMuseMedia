name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Typecheck
        run: npm run typecheck 2>&1 | tee typecheck.log
      - name: Upload typecheck diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          retention-days: 7
      - run: npm run lint
      - run: npm run test
      - name: Build
        run: npm run build 2>&1 | tee build.log
      - name: Upload build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: build.log
          retention-days: 7
